server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # MIME types para assets 3D
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/webp                            webp;
        image/svg+xml                         svg;
        model/gltf-binary                     glb;
        model/gltf+json                       gltf;
        font/woff2                            woff2;
        font/woff                             woff;
    }

    # Headers para assets pesados (GLB)
    location ~* \.(glb|gltf)$ {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
